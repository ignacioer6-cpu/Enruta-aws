<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'mi_app/css/bootstrap.min.css' %}">
    <script src="{% static 'mi_app/js/jquery-4.0.0.min.js'%}"></script>
    <script src="{% static 'mi_app/js/bootstrap.min.js' %}"></script>
    <style>
        /* Estética Neon-Dark: Negro, Morado y Celeste */
        body {
            background-color: #050505; /* Negro puro */
            background-image: 
                radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.15) 0, transparent 40%), 
                radial-gradient(at 100% 100%, rgba(34, 211, 238, 0.15) 0, transparent 40%);
            color: #a0aec0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 40px 15px;
        }

        .container {
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 45px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            max-width: 800px; /* Un poco más estrecho para formularios */
            margin: auto;
        }

        /* Encabezados */
        h1 {
            color: #ffffff;
            font-weight: 200;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .top-logo {
            max-height: 70px;
            width: auto;
            float: right;
            filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.4));
        }

        /* Botones de Navegación */
        .btn-group-custom {
            display: flex;
            gap: 12px;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .btn-inicio {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #1a1a1a;
            color: #ffffff;
        }

        .btn-inicio:hover {
            transform: translateY(-3px);
            color: #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-inicio.conductor { border-bottom: 3px solid #7c3aed; }
        .btn-inicio.pasajero { border-bottom: 3px solid #22d3ee; }

        .btn-inicio.conductor:hover { background: #7c3aed; }
        .btn-inicio.pasajero:hover { background: #22d3ee; color: #000; }

        /* Formulario */
        label {
            color: #22d3ee; /* Celeste para las etiquetas */
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .form-control:focus {
            background: #1e293b;
            border-color: #7c3aed;
            box-shadow: 0 0 0 0.25rem rgba(124, 58, 237, 0.25);
            color: #fff;
        }

        /* Botón Guardar (Personalizado) */
        .custom-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            color: #fff;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 15px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .custom-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        }

        /* Mensajes de éxito/error */
        .red { color: #f87171; text-shadow: 0 0 10px rgba(248, 113, 113, 0.3); }
        .green { color: #34d399; text-shadow: 0 0 10px rgba(52, 211, 153, 0.3); }

        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(124, 58, 237, 0.5), transparent);
            margin: 30px 0;
        }

        .img-registro {
            border: 2px solid #7c3aed;
            padding: 5px;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
        }
    </style>
    <title>En Ruta | Registro Conductor</title>
</head>
<body>
    <div class="container">
        <!-- Navegación y Logo -->
        <img src="{% static 'img/xs.png' %}" alt="Logo En Ruta" class="top-logo" />
        <h1>Navegación</h1>
        <div class="btn-group-custom">
            <a href="/" class="btn-inicio">🏠 Inicio</a>
            <a href="/registroC/" class="btn-inicio conductor">🚗 Conductor</a>
            <a href="/registroP/" class="btn-inicio pasajero">👤 Pasajero</a>
        </div>

        <hr>

        <h1>Registro de Conductor</h1>
        
        <div style="text-align:center; margin-bottom: 30px;">
            <img src="{% static 'img/bus.jpg' %}" alt="Imagen de registro" class="img-registro" style="max-width: 240px; width: 100%; height: auto; border-radius: 16px;" />
        </div>

        {% if msg %}
            <h3 class="{{color}}" style="text-align: center; font-size: 1.2rem; margin-bottom: 20px;">{{msg}}</h3>
        {% endif %}

        <form action="/procesar/" autocomplete="off" method="post">
            {% csrf_token %}
            <input type="hidden" name="tipo_registro" value="conductor" />
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Run</label>
                    <input type="text" class="form-control" name="txt_run" required placeholder="Ej: 12.345.678-9" />
                </div>
                <div class="col-md-6 mb-3">
                    <label>Clave</label>
                    <input type="password" class="form-control" name="txt_clave" required placeholder="Ej: ********" />
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Nombres</label>
                    <input type="text" class="form-control" name="txt_nombres" required placeholder="Ej: Ignacio">
                </div>
                <div class="col-md-6 mb-3">
                    <label>Apellidos</label>
                    <input type="text" class="form-control" name="txt_apellidos" required placeholder="Ej: Reyes">
                </div>
            </div>

            <div class="mb-3">
                <label>Correo Electrónico</label>
                <input type="email" class="form-control" name="txt_correo" required placeholder="ejemplo@correo.cl">
            </div>

            <input type="submit" class="custom-btn form-control" value="Guardar Registro">
        </form>
    </div>
</body>
</html>
